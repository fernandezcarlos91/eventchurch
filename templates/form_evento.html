<!-- templates/form_evento.html -->
{% extends 'base.html' %}

{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card-modern">
            <div class="card-header">
                <h4 class="mb-0 fw-semibold">
                    {% if accion == 'Crear' %}
                        <i class="fas fa-plus me-2" style="color: var(--accent);"></i>{{ titulo }}
                    {% else %}
                        <i class="fas fa-edit me-2" style="color: var(--warning);"></i>{{ titulo }}
                    {% endif %}
                </h4>
            </div>
            <div class="card-body">
                {% if exito %}
                    <div class="alert alert-modern alert-success">
                        <i class="fas fa-check-circle me-2"></i>{{ exito }}
                    </div>
                {% endif %}
                
                {% if error %}
                    <div class="alert alert-modern alert-danger">
                        <i class="fas fa-exclamation-circle me-2"></i>{{ error }}
                    </div>
                {% endif %}

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nombre del Evento <span class="text-danger">*</span></label>
                        <input type="text" name="nombre" class="form-control" 
                               value="{{ evento.nombre or '' }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea name="descripcion" rows="3" class="form-control">{{ evento.descripcion or '' }}</textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-semibold">Fecha Inicio <span class="text-danger">*</span></label>
                            <input type="date" name="fecha_inicio" class="form-control" 
                                   value="{{ evento.fecha_inicio or '' }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-semibold">Fecha Fin <span class="text-danger">*</span></label>
                            <input type="date" name="fecha_fin" class="form-control" 
                                   value="{{ evento.fecha_fin or '' }}" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Ubicación</label>
                        <input type="text" name="ubicacion" class="form-control" 
                               value="{{ evento.ubicacion or '' }}">
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-semibold">Tipo de Evento <span class="text-danger">*</span></label>
                            <select name="tipo_evento" class="form-select" required>
                                <option value="">Seleccionar...</option>
                                <option value="MISIONES" {% if evento.tipo_evento == 'MISIONES' %}selected{% endif %}>Misiones</option>
                                <option value="FAMILIAS" {% if evento.tipo_evento == 'FAMILIAS' %}selected{% endif %}>Familias</option>
                                <option value="ANIVERSARIO" {% if evento.tipo_evento == 'ANIVERSARIO' %}selected{% endif %}>Aniversario</option>
                                <option value="DIA_ESPECIAL" {% if evento.tipo_evento == 'DIA_ESPECIAL' %}selected{% endif %}>Día Especial</option>
                                <option value="RETIRO" {% if evento.tipo_evento == 'RETIRO' %}selected{% endif %}>Retiro</option>
                                <option value="SOLIDARIO" {% if evento.tipo_evento == 'SOLIDARIO' %}selected{% endif %}>Solidario</option>
                                <option value="OTRO" {% if evento.tipo_evento == 'OTRO' %}selected{% endif %}>Otro</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-semibold">Estado</label>
                            <select name="estado" class="form-select">
                                <option value="PLANEADO" {% if evento.estado == 'PLANEADO' %}selected{% endif %}>Planeado</option>
                                <option value="EN_PREPARACION" {% if evento.estado == 'EN_PREPARACION' %}selected{% endif %}>En Preparación</option>
                                <option value="EN_CURSO" {% if evento.estado == 'EN_CURSO' %}selected{% endif %}>En Curso</option>
                                <option value="FINALIZADO" {% if evento.estado == 'FINALIZADO' %}selected{% endif %}>Finalizado</option>
                                <option value="CANCELADO" {% if evento.estado == 'CANCELADO' %}selected{% endif %}>Cancelado</option>
                            </select>
                        </div>
                    </div>

                    <hr style="border-color: var(--border);">
                    <div class="d-flex justify-content-end gap-2">
                        <a href="/eventos/" class="btn btn-modern btn-outline-modern">Cancelar</a>
                        <button type="submit" class="btn btn-modern btn-primary-modern">
                            <i class="fas fa-save me-1"></i>
                            {% if accion == 'Crear' %}Guardar Evento{% else %}Actualizar Evento{% endif %}
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
